name: pytest

on:
  push:
    branches:
      - develop
      - master
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.x"]
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pytest
          pip install -e .
      - name: Run tests
        run: |
          pytest -v tests --ignore=tests/integration
      - name: Build and verify wheel contents
        if: matrix.python-version == '3.x'
        run: |
          python -m build
          python -m pip install --force-reinstall --no-deps dist/*.whl
          cd /tmp
          python -I -c "from importlib.resources import files; import wnutils; schemas = files('wnutils') / 'xsd_pub'; assert (schemas / 'catalog').is_file(); assert (schemas / 'libnucnet.xsd').is_file(); assert (schemas / 'xml.xsd').is_file(); assert (schemas / 'README.md').is_file(); assert (schemas / 'W3C_LICENSE.txt').is_file(); assert wnutils.__version__ == '4.0.0'"
